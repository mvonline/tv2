<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TV2 — Category admin</title>
  <style>
    :root { font-family: system-ui, sans-serif; background: #0c0e14; color: #e8ecf5; }
    body { max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; font-weight: 700; }
    p.muted { color: #8b93a7; font-size: 0.9rem; }
    label { display: block; margin-top: 0.75rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: #8b93a7; }
    input, button { font: inherit; padding: 0.5rem 0.75rem; border-radius: 8px; border: 1px solid #2a3142; background: #141824; color: inherit; }
    button { cursor: pointer; margin-top: 1rem; margin-right: 0.5rem; background: #2d3d8f; border-color: #4a5fc1; }
    button.secondary { background: transparent; }
    table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; font-size: 0.9rem; }
    th, td { text-align: left; padding: 0.5rem 0.4rem; border-bottom: 1px solid #2a3142; }
    th { color: #8b93a7; font-weight: 600; }
    .err { color: #f87171; margin-top: 0.5rem; }
    .row-actions button { margin-top: 0; font-size: 0.8rem; padding: 0.25rem 0.5rem; }
  </style>
</head>
<body>
  <h1>Category admin</h1>
  <p class="muted">Sign in with HTTP Basic (same as <code>ADMIN_USER</code> / <code>ADMIN_PASSWORD</code>). Session cookie is set after &quot;Save session&quot;.</p>

  <div id="login">
    <label>Username</label>
    <input type="text" id="user" autocomplete="username" />
    <label>Password</label>
    <input type="password" id="pass" autocomplete="current-password" />
    <div>
      <button type="button" id="btnSession">Save session (cookie)</button>
      <button type="button" class="secondary" id="btnLoad">Load categories</button>
    </div>
    <p id="err" class="err" hidden></p>
  </div>

  <table id="tbl" hidden>
    <thead>
      <tr>
        <th>Slug</th>
        <th>Label</th>
        <th>Sort</th>
        <th>Active</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <form id="add" hidden>
    <h2 style="font-size:1rem;margin-top:2rem;">Add category</h2>
    <label>Slug</label>
    <input name="slug" required pattern="[a-z0-9-]+" placeholder="e.g. sport" />
    <label>Label</label>
    <input name="label" required />
    <label>Sort order</label>
    <input name="sort_order" type="number" value="100" />
    <label><input type="checkbox" name="active" checked /> Active</label>
    <div><button type="submit">Add</button></div>
  </form>

  <script>
    const api = (path) => "/api" + path;
    function authHeader() {
      const u = document.getElementById("user").value.trim();
      const p = document.getElementById("pass").value;
      if (!u || !p) throw new Error("Enter username and password");
      return "Basic " + btoa(unescape(encodeURIComponent(u + ":" + p)));
    }
    function showErr(msg) {
      const e = document.getElementById("err");
      e.textContent = msg || "";
      e.hidden = !msg;
    }
    async function saveSession() {
      showErr("");
      try {
        const r = await fetch(api("/admin/session"), {
          method: "POST",
          headers: { Authorization: authHeader() },
          credentials: "same-origin",
        });
        if (!r.ok) throw new Error(r.status === 401 ? "Invalid credentials" : "HTTP " + r.status);
        await load();
      } catch (e) {
        showErr(e.message || String(e));
      }
    }
    async function load() {
      showErr("");
      try {
        let r = await fetch(api("/admin/categories"), { credentials: "same-origin" });
        if (r.status === 401) {
          r = await fetch(api("/admin/categories"), {
            headers: { Authorization: authHeader() },
            credentials: "same-origin",
          });
        }
        if (!r.ok) throw new Error(r.status === 401 ? "Unauthorized" : "HTTP " + r.status);
        render(await r.json());
      } catch (e) {
        showErr(e.message || String(e));
      }
    }
    function render(rows) {
      document.getElementById("tbl").hidden = false;
      document.getElementById("add").hidden = false;
      const tb = document.getElementById("tbody");
      tb.innerHTML = "";
      for (const row of rows) {
        const tr = document.createElement("tr");
        tr.innerHTML =
          "<td><code>" + escapeHtml(row.slug) + "</code></td>" +
          "<td>" + escapeHtml(row.label) + "</td>" +
          "<td>" + row.sort_order + "</td>" +
          "<td>" + (row.active ? "yes" : "no") + "</td>" +
          "<td class=\"row-actions\"><button type=\"button\" data-del=\"" + escapeHtml(row.slug) + "\">Delete</button></td>";
        tb.appendChild(tr);
      }
      tb.querySelectorAll("button[data-del]").forEach((btn) => {
        btn.addEventListener("click", () => del(btn.getAttribute("data-del")));
      });
    }
    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }
    async function del(slug) {
      if (!confirm("Delete " + slug + "?")) return;
      showErr("");
      try {
        const r = await fetch(api("/admin/categories/" + encodeURIComponent(slug)), {
          method: "DELETE",
          headers: { Authorization: authHeader() },
          credentials: "same-origin",
        });
        if (!r.ok) throw new Error("HTTP " + r.status);
        await load();
      } catch (e) {
        showErr(e.message || String(e));
      }
    }
    document.getElementById("btnSession").addEventListener("click", saveSession);
    document.getElementById("btnLoad").addEventListener("click", load);
    document.getElementById("add").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      showErr("");
      const fd = new FormData(ev.target);
      const body = {
        slug: fd.get("slug"),
        label: fd.get("label"),
        sort_order: Number(fd.get("sort_order") || 0),
        active: fd.get("active") === "on",
      };
      try {
        const r = await fetch(api("/admin/categories"), {
          method: "POST",
          headers: {
            Authorization: authHeader(),
            "Content-Type": "application/json",
          },
          credentials: "same-origin",
          body: JSON.stringify(body),
        });
        if (!r.ok) throw new Error("HTTP " + r.status);
        ev.target.reset();
        await load();
      } catch (e) {
        showErr(e.message || String(e));
      }
    });
  </script>
</body>
</html>
