services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      CATEGORY_DB_PATH: /data/categories.db
      CHANNELS_JSON_PATH: /data/channel-data/channels.json
      CHANNELS_JSON_URL: ${CHANNELS_JSON_URL:-}
      SKIP_CHANNELS_FETCH: ${SKIP_CHANNELS_FETCH:-0}
    volumes:
      - category-db:/data
      - channels-data:/data/channel-data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - channels-data:/usr/share/nginx/html/data:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  category-db:
  channels-data:
