server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long ?url=... query strings for /proxy/hls
    large_client_header_buffers 4 32k;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Static logos: do not fall through to SPA (try_files … /index.html), or missing files
    # return the React app and Router shows a fake "404" for /logo/... URLs.
    location ^~ /logo/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public";
    }

    # Use $http_host so the port is preserved (e.g. localhost:8080). $host omits the port and
    # breaks FastAPI's request.url / HLS playlist rewrite URLs (segments would hit :80).
    location /api/ {
        proxy_pass http://api:8787/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /proxy/ {
        proxy_pass http://api:8787/proxy/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    location = /admin {
        proxy_pass http://api:8787/admin;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
