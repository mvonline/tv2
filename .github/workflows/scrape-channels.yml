name: Scrape channels

on:
  schedule:
    # Every 6 hours (UTC): 00:00, 06:00, 12:00, 18:00
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-channels
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run scraper
        run: python backend/scrape.py --delay 1 -o backend/data/channels.json

      - name: Categorize channels (name-based)
        run: python backend/ai_categorize.py -i backend/data/channels.json

      - name: Sync categories into SQLite
        run: python backend/sync_categories.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/data/channels.json backend/data/categories.db logo/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update channels and logos [skip ci]"
            git push
          fi
