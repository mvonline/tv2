# Requires GitHub Pages to use "GitHub Actions" as the build source (repo Settings → Pages).
# If deploy-pages fails with HttpError 404, open Settings → Pages and set Source to GitHub Actions, then re-run.

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - "backend/data/channels.json"
      - "logo/**"
      - ".github/workflows/deploy-github-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Vite base path
        id: base
        shell: bash
        run: |
          NAME="${{ github.event.repository.name }}"
          if [[ "$NAME" == *.github.io ]]; then
            echo "Vite base: / (user or org site)"
            echo "vite_base=/" >> "$GITHUB_OUTPUT"
          else
            echo "Vite base: /$NAME/ (project site)"
            echo "vite_base=/$NAME/" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Intentionally no actions/configure-pages: it calls GET /repos/.../pages and returns 404
      # until Settings → Pages → Build: GitHub Actions is enabled once. We don't need its outputs.

      - name: Install & build
        working-directory: frontend
        env:
          VITE_BASE: ${{ steps.base.outputs.vite_base }}
        run: |
          npm ci
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
